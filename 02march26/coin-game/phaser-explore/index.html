<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>
<script>
  const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    scene: {
      create() {
        this.add.text(300, 250, "Hello Phaser", { fontSize: "32px", fill: "#fff" });
      }
    }
  };

  new Phaser.Game(config);
</script>
</body>
</html>
