<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn to Build: Drop & Merge (2048-style)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        .game-container {
            background: #2d4059;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #eee;
            flex-wrap: wrap;
            gap: 10px;
        }
        .score-box {
            background: #1e2b3a;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .next-piece-box {
            background: #1e2b3a;
            padding: 8px 16px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .next-tile {
            background: #ffb347;
            color: #1e2b3a;
            font-weight: bold;
            font-size: 1.5rem;
            padding: 5px 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ffb347;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            background: #233142;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px #0f1a24;
        }
        .cell {
            aspect-ratio: 1 / 1;
            background: #3e5a76;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: white;
            box-shadow: 0 5px 0 #1d2b3a;
            transition: all 0.1s ease;
            text-shadow: 1px 1px 2px black;
        }
        /* Dynamic tile colors based on number */
        .cell[data-value="2"] { background: #a8e6cf; color: #1e3c72; }
        .cell[data-value="4"] { background: #d4edf5; color: #1e3c72; }
        .cell[data-value="8"] { background: #ffb48a; color: #1e3c72; }
        .cell[data-value="16"] { background: #ff8a7a; color: white; }
        .cell[data-value="32"] { background: #ff6f61; color: white; }
        .cell[data-value="64"] { background: #ff4b3e; color: white; }
        .cell[data-value="128"] { background: #ffd93e; color: #1e3c72; }
        .cell[data-value="256"] { background: #f9d56e; color: #1e3c72; }
        .cell[data-value="512"] { background: #f8c764; color: #1e3c72; }
        .cell[data-value="1024"] { background: #f8b764; color: #1e3c72; }
        .cell[data-value="2048"] { background: #f8a764; color: white; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        button {
            background: #f08a5d;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 7px 0 #b85e3a;
            transition: 0.05s linear;
            border: 1px solid #ffba92;
            min-width: 80px;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b85e3a;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 7px 0 #b85e3a;
            cursor: not-allowed;
        }
        .restart-btn {
            background: #4a6b8a;
            box-shadow: 0 7px 0 #2a3f5a;
        }
        .footer {
            color: #aac3d4;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .footer p {
            background: #1e2b3a;
            padding: 10px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score-box">Score: <span id="scoreDisplay">0</span></div>
            <div class="next-piece-box">
                <span>Next:</span>
                <span id="nextPieceDisplay" class="next-tile">2</span>
            </div>
        </div>

        <!-- Game grid: 6 columns, rows will be added dynamically by JS -->
        <div id="gameGrid" class="grid"></div>

        <div class="controls">
            <button id="moveLeftBtn" title="Left (A or ←)">←</button>
            <button id="moveRightBtn" title="Right (D or →)">→</button>
            <button id="dropBtn" title="Drop (Space or ↓)">⬇ Drop</button>
            <button id="restartBtn" class="restart-btn">⟲ New</button>
        </div>

        <div class="footer">
            <p>⬅️ ➡️ move | ⬇️ drop | merge same numbers | avoid top!</p>
        </div>
    </div>

    <script>
        // --- STEP 1: UNDERSTAND THE GAME LOGIC ---
        // We have a grid (6 columns, rows grow as we play).
        // A "piece" (a number tile, like 2, 4, 8...) appears at the top.
        // You move it left/right and drop it.
        // It falls until it hits bottom or another tile.
        // If the tile below has the SAME number, they MERGE into one (sum).
        // Merging can create combos if the new number also matches below.
        // Game ends if a tile is placed above the top row (row 0).

        // --- STEP 2: SET UP THE GAME STATE ---
        const COLS = 6;               // Fixed width
        let grid = [];                // 2D array: grid[row][col] = number or null
        let currentPiece = null;      // { row, col, value } - the falling piece
        let nextPieceValue = 2;       // Next number to play
        let score = 0;
        let gameOver = false;

        // Get HTML elements
        const gridElement = document.getElementById('gameGrid');
        const scoreSpan = document.getElementById('scoreDisplay');
        const nextPieceSpan = document.getElementById('nextPieceDisplay');

        // --- STEP 3: HELPER FUNCTIONS ---

        // Initialize a new grid (empty)
        function createEmptyGrid() {
            return []; // Start with no rows
        }

        // Generate a new random piece value (2 or 4, like in 2048 style, but you can extend)
        function getRandomPieceValue() {
            return Math.random() < 0.8 ? 2 : 4; // 80% chance 2, 20% chance 4
        }

        // Check if a position (row, col) is within grid bounds and empty
        function isCellEmpty(row, col) {
            return row >= 0 && row < grid.length && col >= 0 && col < COLS && grid[row][col] === null;
        }

        // Check if the current piece can move to newRow, newCol
        function canMovePiece(newRow, newCol) {
            if (!currentPiece) return false;
            // Must be within columns
            if (newCol < 0 || newCol >= COLS) return false;
            // If newRow is below the grid (i.e., it's past bottom), it's invalid for placement
            if (newRow >= grid.length) {
                // We can only move down if there's an empty cell or merge? Actually drop handles it.
                // For movement, we only check left/right, so row stays same. Let's handle row in drop.
                return true; // row check not needed for left/right
            }
            // If row exists in grid, check if target cell is empty
            if (newRow >= 0) {
                return grid[newRow][newCol] === null;
            }
            return true; // newRow is above grid (negative) always allowed
        }

        // Move current piece left or right
        function movePiece(deltaCol) {
            if (!currentPiece || gameOver) return false;

            const newCol = currentPiece.col + deltaCol;
            // Use current row for check (row doesn't change when moving sideways)
            if (canMovePiece(currentPiece.row, newCol)) {
                currentPiece.col = newCol;
                renderGrid();
                return true;
            }
            return false;
        }

        // --- STEP 4: THE CORE LOGIC - DROPPING AND MERGING ---

        // This function handles the drop: moves piece down until it can't, then merges
        function dropPiece() {
            if (!currentPiece || gameOver) return;

            // 1. Simulate falling until it hits something
            let landed = false;
            while (!landed) {
                const nextRow = currentPiece.row + 1;

                // Check if next row is beyond the grid (bottom)
                if (nextRow >= grid.length) {
                    // We need to potentially add a new row at the bottom
                    // But first, check if we can merge with anything? No, because beyond grid means empty space.
                    // We'll add rows dynamically. For now, just drop to new row.
                    // Actually easier: we expand grid as we go.
                    // Let's handle this case: if nextRow is exactly grid.length, we can place in a new row.
                    if (nextRow === grid.length) {
                        // Place piece in a new row at the bottom
                        // Add a new row full of nulls
                        grid.push(new Array(COLS).fill(null));
                        // Now place piece in that new row
                        grid[nextRow][currentPiece.col] = currentPiece.value;
                        currentPiece = null; // Piece placed
                        landed = true;
                        break;
                    } else {
                        // This case shouldn't happen normally
                        break;
                    }
                }

                // Check cell below
                if (grid[nextRow][currentPiece.col] === null) {
                    // Empty below, move down
                    currentPiece.row = nextRow;
                } else {
                    // There's a tile below. Check if it has the same value to MERGE
                    const belowValue = grid[nextRow][currentPiece.col];
                    if (belowValue === currentPiece.value) {
                        // MERGE! Remove the tile below, increase current piece value, and continue falling?
                        // In Drop & Merge, they merge into one and that new block can continue falling/merging.
                        // So we remove the below tile, double current piece value, and stay in same row (then next loop will check again)
                        grid[nextRow][currentPiece.col] = null; // remove merged tile
                        currentPiece.value *= 2; // double
                        score += currentPiece.value; // add to score
                        // Now we stay in current row and will check below again in next while iteration
                        // (do not increase row yet)
                    } else {
                        // Different number below -> land here
                        // Place piece at current row
                        // Ensure row exists (if current row is -1? no, piece starts at row -1? we start at row -1? Let's define start)
                        // We'll handle starting row in spawn function. For now, assume row is valid.
                        if (currentPiece.row < 0) {
                            // This means piece is above grid! Game over condition
                            gameOver = true;
                            alert("Game Over! You placed a piece above the top.");
                            renderGrid();
                            return;
                        }
                        // Ensure grid has this row (it should)
                        while (currentPiece.row >= grid.length) {
                            grid.push(new Array(COLS).fill(null));
                        }
                        grid[currentPiece.row][currentPiece.col] = currentPiece.value;
                        currentPiece = null;
                        landed = true;
                    }
                }
            }

            // After placing, check for game over: if any cell in row 0 is filled, game over
            if (grid.length > 0) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[0][c] !== null) {
                        gameOver = true;
                        break;
                    }
                }
            }

            // If piece landed, spawn next piece
            if (currentPiece === null && !gameOver) {
                spawnNewPiece();
            }

            // Clean up any fully empty rows at the top? Optional, but can keep for simplicity.
            // Remove empty rows from top to keep grid compact (but careful with row indices)
            while (grid.length > 0 && grid[0].every(cell => cell === null)) {
                grid.shift(); // remove top empty row
                // Also need to adjust currentPiece row if it exists? not needed as piece is null here.
            }

            renderGrid();
            updateScoreAndNext();
        }

        // --- STEP 5: SPAWNING A NEW PIECE ---

        function spawnNewPiece() {
            if (gameOver) return;

            // Use the prepared nextPieceValue, then generate a new random for next time
            const value = nextPieceValue;
            nextPieceValue = getRandomPieceValue();

            // New piece starts at row = -1 (above grid), at a random column
            const startCol = Math.floor(Math.random() * COLS);
            currentPiece = {
                row: -1,      // Start above the grid
                col: startCol,
                value: value
            };

            // Immediately check if the starting position is blocked? 
            // If row 0 at that column is not empty, game over because piece can't even enter.
            if (grid.length > 0 && grid[0][startCol] !== null) {
                gameOver = true;
                currentPiece = null;
                renderGrid();
                alert("Game Over! No space for new piece.");
            }
        }

        // --- STEP 6: RENDERING THE GRID ---

        function renderGrid() {
            // Clear grid element
            gridElement.innerHTML = '';

            // Determine total rows to display: include current piece if it's within or above
            const totalRows = grid.length + (currentPiece && currentPiece.row < 0 ? 1 : 0);

            // Create cells row by row
            for (let r = 0; r < totalRows; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    let value = null;
                    // Check if this cell has a grid tile
                    if (r < grid.length && grid[r] && grid[r][c] !== null) {
                        value = grid[r][c];
                    }
                    // Check if this cell has the current piece (only if piece row matches)
                    if (currentPiece && currentPiece.row === r && currentPiece.col === c) {
                        value = currentPiece.value;
                    }

                    if (value !== null) {
                        cell.textContent = value;
                        cell.setAttribute('data-value', value);
                    } else {
                        cell.textContent = '';
                        cell.removeAttribute('data-value');
                    }
                    gridElement.appendChild(cell);
                }
            }
        }

        function updateScoreAndNext() {
            scoreSpan.textContent = score;
            nextPieceSpan.textContent = nextPieceValue;
        }

        // --- STEP 7: INITIALIZE AND RESTART ---

        function restartGame() {
            grid = createEmptyGrid();
            currentPiece = null;
            nextPieceValue = getRandomPieceValue();
            score = 0;
            gameOver = false;
            spawnNewPiece(); // This will set currentPiece and maybe nextPieceValue again
            renderGrid();
            updateScoreAndNext();
        }

        // --- STEP 8: EVENT LISTENERS (keyboard and buttons) ---

        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            if (gameOver) return;

            // Prevent page scrolling with arrow keys
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Space' || e.key === 'ArrowDown') {
                e.preventDefault();
            }

            switch (e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    movePiece(-1);
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    movePiece(1);
                    break;
                case ' ':
                case 'Space':
                case 'ArrowDown':
                case 's':
                case 'S':
                    dropPiece();
                    break;
            }
        });

        // Button controls
        document.getElementById('moveLeftBtn').addEventListener('click', () => movePiece(-1));
        document.getElementById('moveRightBtn').addEventListener('click', () => movePiece(1));
        document.getElementById('dropBtn').addEventListener('click', dropPiece);
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        // Start the game
        restartGame();

        // That's it! The core logic is in dropPiece() function. 
        // Try it out and see how merging works. You can enhance colors, animations, and scoring.
    </script>
</body>
</html>
