<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cake Sort</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden; /* no scrollbars */
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
  </body>
</html>
